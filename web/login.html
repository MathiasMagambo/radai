<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in · {{SITE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card" aria-labelledby="loginTitle">
      <div class="login-mark" aria-hidden="true">{{SITE_MARK}}</div>
      <p class="eyebrow">{{SITE_TAGLINE}}</p>
      <h1 id="loginTitle" class="login-title">{{SITE_NAME}}</h1>
      <p class="login-intro">{{SITE_LOGIN_INTRO}}</p>
      <form id="loginForm" class="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="primary" type="submit">ENTER RADIO</button>
      </form>
      <p id="loginError" class="login-error" role="alert" aria-live="polite"></p>
    </section>
  </main>
  <script src="/login.js" defer></script>
</body>
</html>
